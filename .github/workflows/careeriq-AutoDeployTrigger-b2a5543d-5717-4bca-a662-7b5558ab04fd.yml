name: Deploy CareerIQ to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: careeriqacr
          containerAppName: careeriq
          resourceGroup: rg-dshaik1-1365
          containerAppEnvironment: managedEnvironment-rgdshaik11365-a1d5
          targetPort: 80
          ingress: external
          environmentVariables: FOUNDRY_PROJECT_ENDPOINT=${{ secrets.FOUNDRY_PROJECT_ENDPOINT }} AZURE_AI_MODEL_DEPLOYMENT_NAME=${{ secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME }} AZURE_API_KEY=${{ secrets.AZURE_API_KEY }} AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
